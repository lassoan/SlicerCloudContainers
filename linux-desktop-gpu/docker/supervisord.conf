[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
priority=10
autorestart=true
startsecs=0
user=desktop
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.err

[program:plasma]
command=/opt/container/plasma-session.sh
priority=20
autorestart=true
startsecs=5
user=desktop
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/plasma.log
stderr_logfile=/var/log/supervisor/plasma.err

[program:x11vnc]
command=/bin/bash -lc "until xdpyinfo -display :1 >/dev/null 2>&1; do sleep 1; done; exec x11vnc -display :1 -forever -shared -rfbport 5900 -rfbauth /run/x11vnc.pass -xkb -noxdamage -noshm"
priority=30
autorestart=true
startsecs=0
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc.err

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --listen 6080 --vnc localhost:5900
priority=40
autorestart=true
startsecs=0
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.err

[program:sshd]
command=/usr/sbin/sshd -D -e
priority=15
autorestart=true
startsecs=0
stdout_logfile=/var/log/supervisor/sshd.log
stderr_logfile=/var/log/supervisor/sshd.err

[program:syncthing]
command=/usr/bin/syncthing serve --home=/config/syncthing --no-browser --gui-address=0.0.0.0:8384
priority=50
autorestart=true
startsecs=5
user=desktop
environment=HOME="/home/desktop",USER="desktop",STNOUPGRADE="1"
stdout_logfile=/var/log/supervisor/syncthing.log
stderr_logfile=/var/log/supervisor/syncthing.err
